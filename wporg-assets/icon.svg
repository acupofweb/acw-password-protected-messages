<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#253268"/>
      <stop offset="1" stop-color="#354788"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#131a3a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="472" cy="40" r="150" fill="#009db5" opacity="0.18"/>
  <circle cx="60" cy="470" r="120" fill="#e5335b" opacity="0.15"/>

  <!-- message card -->
  <g filter="url(#shadow)">
    <rect x="96" y="104" width="272" height="228" rx="28" fill="#ffffff"/>
  </g>

  <!-- card content: custom message lines -->
  <rect x="130" y="140" width="112" height="26" rx="13" fill="#e5335b"/>
  <rect x="130" y="190" width="204" height="16" rx="8" fill="#f0d2cc"/>
  <rect x="130" y="220" width="160" height="16" rx="8" fill="#f0d2cc"/>

  <!-- password input with dots -->
  <rect x="130" y="256" width="176" height="44" rx="12" fill="#eef0f7"/>
  <circle cx="156" cy="278" r="8" fill="#253268"/>
  <circle cx="184" cy="278" r="8" fill="#253268"/>
  <circle cx="212" cy="278" r="8" fill="#253268"/>
  <circle cx="240" cy="278" r="8" fill="#253268"/>

  <!-- padlock overlapping the card -->
  <g filter="url(#shadow)">
    <path d="M 296 344 v -38 a 46 46 0 0 1 92 0 v 38" fill="none" stroke="#009db5" stroke-width="22" stroke-linecap="round"/>
    <rect x="272" y="336" width="140" height="112" rx="22" fill="#fec704"/>
    <circle cx="342" cy="380" r="16" fill="#253268"/>
    <rect x="335" y="388" width="14" height="30" rx="7" fill="#253268"/>
  </g>
</svg>
